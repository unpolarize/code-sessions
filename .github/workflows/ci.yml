name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Configure git identity (for store tests)
        run: |
          git config --global user.email "ci@code-sessions"
          git config --global user.name "ci"
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
