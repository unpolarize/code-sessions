# OpenTelemetry Collector config for code-sessions telemetry ingestion.
#
# Receives the OTLP/HTTP JSON that `code-sessions export` posts to :4318
# (/v1/traces, /v1/metrics) and fans it out to any OTel-compatible exporter.
# As shipped it just prints every span/metric to the collector log (`debug`) so
# you can confirm export works; uncomment `otlphttp` to forward to a vendor or
# your own backend.

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318   # code-sessions posts OTLP/HTTP JSON here
      grpc:
        endpoint: 0.0.0.0:4317   # optional, for other producers

processors:
  batch:
    timeout: 5s

exporters:
  debug:
    verbosity: detailed

  # Forward to ANY OTel-compatible backend (a vendor, or your own collector/store).
  # otlphttp:
  #   endpoint: https://otlp.example.com
  #   headers:
  #     Authorization: Bearer ${OTLP_TOKEN}

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]    # add `otlphttp` to forward
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]    # add `otlphttp` to forward
  telemetry:
    logs:
      level: info
