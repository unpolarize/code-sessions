# OpenTelemetry Collector config for code-sessions telemetry ingestion.
#
# Receives the OTLP/HTTP JSON that `code-sessions export` posts to :4318
# (/v1/traces, /v1/metrics) and fans it out to:
#   - debug      — prints every span/metric to the collector log (instant sanity check)
#   - clickhouse — lands spans + metrics in queryable tables (an OLAP backend example)
#
# Drop the `clickhouse` exporter from the pipelines (leaving only `debug`) if you
# just want to confirm export works without standing up a database. Swap clickhouse
# for any OTLP-compatible exporter (prometheusremotewrite, otlphttp to a vendor, …).

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318   # code-sessions posts OTLP/HTTP JSON here
      grpc:
        endpoint: 0.0.0.0:4317   # optional, for other producers

processors:
  batch:
    timeout: 5s

exporters:
  debug:
    verbosity: detailed

  clickhouse:
    endpoint: tcp://clickhouse:9000?dial_timeout=10s&compress=lz4
    database: otel
    username: default
    password: ""
    create_schema: true          # auto-creates otel_traces + otel_metrics_* tables
    ttl: 720h                     # 30-day retention
    traces_table_name: otel_traces
    metrics_table_name: otel_metrics
    timeout: 10s
    retry_on_failure:
      enabled: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, clickhouse]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, clickhouse]
  telemetry:
    logs:
      level: info
