# Local telemetry ingestion: a vendor-neutral OTel Collector (contrib) that
# receives what code-sessions exports and prints it — and can forward to any
# OTel-compatible backend (see config.yaml).
#
#   docker compose -f examples/otel-collector/docker-compose.yaml up -d
#   CODE_SESSIONS_TELEMETRY=1 OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318 \
#     node packages/agent/bin/code-sessions.mjs export --since 2026-05
#
# Collector listens on :4318 (OTLP/HTTP, what code-sessions posts) and :4317 (gRPC).

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4318:4318"   # OTLP/HTTP  <-- code-sessions exports here
      - "4317:4317"   # OTLP/gRPC
